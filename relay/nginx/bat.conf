# bat.conf — nginx config completo do relay
# Capturado do relay em produção (2026-04-12)
# Substitui /etc/nginx/nginx.conf inteiro (não é fragmento de sites-enabled)
#
# Para deploy: setup.sh copia este arquivo para /etc/nginx/nginx.conf
# Variáveis substituídas por setup.sh via sed antes de copiar:
#   __RELAY_IP__  → IP público do relay (usado apenas para referência nos logs)

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    log_format research '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                        'rt=$request_time ssl=$ssl_protocol cipher=$ssl_cipher';

    # C2 check-ins: não logar (evitar acúmulo de IPs de agentes nos logs)
    access_log /var/log/nginx/access.log research;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    client_max_body_size 10M;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m      rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web:10m      rate=60r/m;
    limit_req_zone $binary_remote_addr zone=scanners:10m rate=5r/m;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/ssl/lab/cert.pem;
        ssl_certificate_key /etc/ssl/lab/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # C2 endpoint — bat-agent beacons (POST only)
        # bat-server escuta em :8443 TLS; nginx faz o TLS externo.
        location = /check-in {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         https://127.0.0.1:8443;
            proxy_ssl_verify   off;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 120s;

            # Suprimir access log do check-in para não rastrear IPs dos agentes
            access_log off;
        }

        # Cover page — qualquer outra rota serve site estático
        location / {
            root  /var/www/nexus;
            index index.html;
            try_files $uri $uri.html $uri/ =404;
            limit_req zone=web burst=30;
            expires 1h;
            add_header Cache-Control "public";
        }

        # Absorver probes de scanner sem fingerprinting via código de erro
        location ~* \.(php|asp|aspx|jsp|cgi|env|git)$ {
            return 200 '';
        }
    }
}
